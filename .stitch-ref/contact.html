        @layer utilities {

        }

<body class="bg-background text-on-background antialiased flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 docked full-width top-0 border-b border-zinc-950 dark:border-zinc-50 border-[0.5px] flat no shadows">
<div class="flex justify-between items-center w-full px-8 py-4 max-w-7xl mx-auto">
<div class="flex items-center gap-6">
<span class="font-serif text-xl font-black uppercase tracking-tighter text-zinc-950 dark:text-zinc-50">Know Your Government</span>
<nav class="hidden md:flex gap-4">
<a class="font-serif uppercase tracking-wider text-sm text-zinc-500 dark:text-zinc-400 hover:bg-zinc-950 hover:text-zinc-50 dark:hover:bg-zinc-50 dark:hover:text-zinc-950 transition-none cursor-pointer active:opacity-80" href="#">GO Directory</a>
<a class="font-serif uppercase tracking-wider text-sm text-zinc-500 dark:text-zinc-400 hover:bg-zinc-950 hover:text-zinc-50 dark:hover:bg-zinc-50 dark:hover:text-zinc-950 transition-none cursor-pointer active:opacity-80" href="#">States</a>
</nav>
</div>
<div>
<!-- Right side empty as per user request -->
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-[container-max] mx-auto px-margin-edge py-section-gap flex flex-col items-center justify-center">
<div class="w-full max-w-2xl">
<div class="mb-stack-lg text-center">
<h1 class="font-headline-lg text-headline-lg text-primary mb-stack-sm">Contact Us</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Administrative Inquiry Form</p>
<hr class="w-16 border-t-0_5 border-primary mx-auto mt-stack-md"/>
</div>
<form class="space-y-stack-md">
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm uppercase text-primary" for="name">Full Name</label>
<input class="bg-transparent border-0 border-b border-primary focus:ring-0 focus:border-primary focus:border-b-2 px-0 py-2 font-body-md text-body-md text-on-background placeholder-on-surface-variant" id="name" name="name" placeholder="Enter your full name" type="text"/>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm uppercase text-primary" for="email">Email Address</label>
<input class="bg-transparent border-0 border-b border-primary focus:ring-0 focus:border-primary focus:border-b-2 px-0 py-2 font-body-md text-body-md text-on-background placeholder-on-surface-variant" id="email" name="email" placeholder="Enter your email address" type="email"/>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm uppercase text-primary" for="inquiry_type">Inquiry Type</label>
<select class="bg-transparent border-0 border-b border-primary focus:ring-0 focus:border-primary focus:border-b-2 px-0 py-2 font-body-md text-body-md text-on-background appearance-none rounded-none" id="inquiry_type" name="inquiry_type">
<option disabled="" selected="" value="">Select an inquiry type</option>
<option value="general">General Information</option>
<option value="records">Public Records Request</option>
<option value="technical">Technical Support</option>
<option value="other">Other</option>
</select>
</div>
<div class="flex flex-col gap-stack-sm pt-stack-sm">
<label class="font-label-sm text-label-sm uppercase text-primary" for="message">Message</label>
<textarea class="bg-transparent border border-primary focus:ring-0 focus:border-primary focus:border-2 px-3 py-2 font-body-md text-body-md text-on-background resize-y" id="message" name="message" placeholder="Detail your inquiry here..." rows="5"></textarea>
</div>
<div class="pt-stack-md flex justify-end">
<button class="bg-primary text-on-primary border border-primary font-label-lg text-label-lg px-8 py-3 uppercase tracking-wider hover:bg-surface-container-lowest hover:text-primary transition-none" type="submit">
                        Submit Inquiry
                    </button>
</div>
</form>
</div>
</main>
<!-- Footer -->
<footer class="bg-zinc-50 dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 full-width border-t border-t-0_5 border-zinc-950 dark:border-zinc-50 flat no shadows">
<div class="w-full py-12 px-8 flex flex-col md:flex-row justify-between items-center border-t border-zinc-950 max-w-7xl mx-auto">
<div class="mb-6 md:mb-0">
<span class="font-serif font-bold uppercase font-serif text-xs tracking-tight">Know Your Government</span>
</div>
<nav class="flex flex-wrap gap-6 justify-center">
<a class="font-serif text-xs tracking-tight text-zinc-600 dark:text-zinc-400 hover:text-zinc-950 dark:hover:text-zinc-50 transition-colors duration-150" href="#">Terms of Service</a>
<a class="font-serif text-xs tracking-tight text-zinc-600 dark:text-zinc-400 hover:text-zinc-950 dark:hover:text-zinc-50 transition-colors duration-150" href="#">Cookie Policy</a>
<a class="font-serif text-xs tracking-tight text-zinc-600 dark:text-zinc-400 hover:text-zinc-950 dark:hover:text-zinc-50 transition-colors duration-150" href="#">Help Center</a>
<a class="font-serif text-xs tracking-tight underline font-bold transition-colors duration-150 text-zinc-900 dark:text-zinc-100" href="#">Contact Us</a>
</nav>
</div>
</footer>
</body></html>
